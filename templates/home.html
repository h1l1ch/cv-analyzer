<!DOCTYPE html>
<html>
<head>
    <title>AI CV Analyzer</title>
</head>
<body>
    <h1>AI CV Analyzer 🚀</h1>

    <form method="post">
        {% csrf_token %}
        <textarea name="cv_text" rows="10" cols="50" placeholder="Paste your CV here..."></textarea>
        <br><br>
        <button type="submit">Analyze</button>
    </form>

    <hr>

    <h2>Result:</h2>
    <p>{{ result }}</p>
</body>
</html>
