{% extends 'base.html' %}

{% block content %}

<h1>AI CV Analyzer 🚀</h1>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <p>Upload PDF:</p>
    {{ form.file }}

    <p>OR paste CV:</p>
    {{ form.text }}

    <p>Paste Job Description:</p>
    {{ form.job_description }}

    <br><br>

    <button type="submit">Analyze</button>
</form>

{% if result %}
<div class="result">
    <h2>Analysis</h2>
    <p>{{ result }}</p>
</div>
{% endif %}

{% endblock %}
