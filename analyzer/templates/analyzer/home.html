<!DOCTYPE html>
<html>
<head>
    <title>AI CV Analyzer</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
            padding: 40px;
        }
        textarea {
            width: 60%;
            padding: 10px;
        }
        button {
            padding: 10px 20px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
        }
        .result {
            margin-top: 20px;
            background: white;
            padding: 20px;
            width: 60%;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h1>AI CV Analyzer 🚀</h1>

<form method="post">
    {% csrf_token %}
    <textarea name="cv_text" rows="10" placeholder="Paste your CV here..."></textarea>
    <br><br>
    <button type="submit" onclick="this.innerText='Analyzing...'">
        Analyze CV
    </button>
</form>

{% if result %}
<div class="result">
    <h2>Analysis</h2>
    <p>{{ result }}</p>
</div>
{% endif %}

</body>
</html>
