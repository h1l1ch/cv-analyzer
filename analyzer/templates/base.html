<!DOCTYPE html>
<html>
<head>
    <title>CV Analyzer</title>

    <style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        margin: 0;
        padding: 0;
    }

    .navbar {
        background: black;
        padding: 15px 30px;
    }

    .navbar a {
        color: white;
        text-decoration: none;
        margin-right: 25px;
        font-size: 18px;
    }

    .container {
        background: white;
        max-width: 900px;
        margin: 40px auto;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
        text-align: center;
        margin-bottom: 40px;
    }

    textarea {
        width: 100%;
        padding: 15px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 16px;
        margin-top: 10px;
    }

    input[type="file"] {
        margin-top: 10px;
        margin-bottom: 20px;
    }

    button {
        background: black;
        color: white;
        border: none;
        padding: 14px 28px;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 20px;
    }

    button:hover {
        background: #333;
    }

    label {
        font-size: 20px;
        font-weight: bold;
    }
    </style>

</head>
<body>

    <div class="navbar">

        <a href="/">Home</a>

        <a href="/dashboard/">Dashboard</a>

        {% if user.is_authenticated %}
            <span>Welcome, {{ user.username }}</span>

            <a href="/accounts/logout/">
                Logout
            </a>
        {% else %}
            <a href="/accounts/login/">
                Login
            </a>
        {% endif %}

    </div>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
